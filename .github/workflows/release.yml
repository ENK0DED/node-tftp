name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm manual publish (must match a v* tag on the current ref)'
        required: true
        type: boolean
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Require manual confirmation
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.confirm }}
        run: |
          echo "::error::Manual publish requires confirm=true."
          exit 1

      - name: Install tftp-hpa build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12

      - name: Read package version
        id: package
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release ref matches package version
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_TAG: v${{ steps.package.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            if [ "$REF_NAME" != "$EXPECTED_TAG" ]; then
              echo "::error::Tag $REF_NAME does not match package version ${{ steps.package.outputs.version }}."
              exit 1
            fi
            exit 0
          fi

          matching_tag="$(git tag --points-at HEAD --list "$EXPECTED_TAG")"
          if [ "$matching_tag" != "$EXPECTED_TAG" ]; then
            echo "::error::Expected HEAD to be tagged with $EXPECTED_TAG before manual publish."
            exit 1
          fi

      - name: Restore tftp-hpa cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .tftp-hpa-bin
            .tftp-hpa-cache
          key: ${{ runner.os }}-tftp-hpa-${{ hashFiles('tests/hpa-build.sh') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build package
        run: bun run build

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.package.outputs.version }}
          generate_release_notes: true
