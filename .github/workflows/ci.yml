name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install tftp-hpa build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Restore tftp-hpa cache
        uses: actions/cache@v4
        with:
          path: |
            .tftp-hpa-bin
            .tftp-hpa-cache
          key: ${{ runner.os }}-tftp-hpa-${{ hashFiles('tests/hpa-build.sh') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build package
        run: bun run build

      - name: Verify npm package contents
        run: npm pack --dry-run
